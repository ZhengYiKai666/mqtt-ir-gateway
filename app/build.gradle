plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.mqttirgateway'
    compileSdk 33

    defaultConfig {
        applicationId "com.example.mqttirgateway"
        minSdk 24
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.5'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
