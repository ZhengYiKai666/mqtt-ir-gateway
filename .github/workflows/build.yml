name: 云端自动构建 APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 配置 Java 17 环境
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 配置指定版本的 Gradle 8.0
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.0' # 👈 显式指定稳定的 Gradle 8.0 版本，防止被升到不兼容的 9.x/10.x
        cache-disabled: true

    - name: 开始编译安装包
      run: |
        gradle assembleDebug --no-daemon

    - name: 上传编译好的 APK 文件
      uses: actions/upload-artifact@v4
      with:
        name: MQTT-IR-Gateway-APK
        path: app/build/outputs/apk/debug/app-debug.apk
